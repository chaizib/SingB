name: Build sing-box with v2ray api

on:
  workflow_dispatch:
  schedule:
    - cron: "20 3 * * 1"

permissions:
  contents: write

jobs:
  check-build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl tar gzip

      - name: Get latest upstream release
        id: latest
        run: |
          # 加上 Token 授权防止被限流，增加重试机制
          latest_tag=$(curl -fsSL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" --retry 3 https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
          if [ -z "$latest_tag" ] || [ "$latest_tag" = "null" ]; then
            echo "::error::无法从官方获取版本号，脚本终止！"
            exit 1
          fi
          echo "tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "version=${latest_tag#v}" >> "$GITHUB_OUTPUT"

      - name: Get current release in this repo
        id: current
        run: |
          current_tag=$(curl -fsSL https://api.github.com/repos/${{ github.repository }}/releases/latest 2>/dev/null | jq -r .tag_name || true)
          echo "tag=$current_tag" >> "$GITHUB_OUTPUT"

      - name: Skip if already latest
        if: steps.latest.outputs.tag == steps.current.outputs.tag
        run: |
          echo "当前仓库已是最新版本: ${{ steps.latest.outputs.tag }}"
          exit 0

      - name: Checkout sing-box source
        uses: actions/checkout@v5
        with:
          repository: SagerNet/sing-box
          ref: ${{ steps.latest.outputs.tag }}
          path: sing-box-src
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: sing-box-src/go.sum

      - name: Prepare build tags and ldflags
        id: meta
        run: |
          cd sing-box-src
          default_tags=$(tr '\n' ',' < release/DEFAULT_BUILD_TAGS | sed 's/,$//')
          final_tags=$(printf '%s\n' "$default_tags" | tr ',' '\n' | grep -v '^with_naive_outbound$' | awk 'NF && !seen[$0]++' | paste -sd',' -)
          final_tags="${final_tags},with_v2ray_api"
          base_ldflags=$(tr '\n' ' ' < release/LDFLAGS | sed 's/  */ /g')
          final_ldflags="-X 'github.com/sagernet/sing-box/constant.Version=${{ steps.latest.outputs.version }}' ${base_ldflags}"
          echo "tags=$final_tags" >> "$GITHUB_OUTPUT"
          echo "ldflags=$final_ldflags" >> "$GITHUB_OUTPUT"

      - name: Build All Platforms
        run: |
          cd sing-box-src
          # 循环编译 amd64, arm64, armv7, 386
          for arch in amd64 arm64 arm 386; do
            output_dir="../dist/linux-$arch"
            [ "$arch" = "arm" ] && output_dir="../dist/linux-armv7"
            mkdir -p "$output_dir"
            GOARM=7 CGO_ENABLED=0 GOOS=linux GOARCH=$arch \
            go build -trimpath \
              -ldflags "${{ steps.meta.outputs.ldflags }}" \
              -tags "${{ steps.meta.outputs.tags }}" \
              -o "$output_dir/sing-box" \
              ./cmd/sing-box
          done

      - name: Package & Sign
        run: |
          mkdir -p release-files
          for d in dist/*; do
            arch=$(basename "$d")
            tar -C "$d" -czf "release-files/sing-box-$arch.tar.gz" sing-box
            cp "$d/sing-box" "release-files/sing-box-$arch"
          done
          sha256sum release-files/* > release-files/sha256sum.txt

      - name: Delete existing release
        if: steps.latest.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.latest.outputs.tag }}" -y --cleanup-tag || true

      - name: Create release
        if: steps.latest.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.latest.outputs.tag }}" \
            release-files/* \
            --repo "${{ github.repository }}" \
            --title "${{ steps.latest.outputs.tag }}" \
            --notes "由私人维护工具自动编译，版本：${{ steps.latest.outputs.tag }}，集成 with_v2ray_api。"
